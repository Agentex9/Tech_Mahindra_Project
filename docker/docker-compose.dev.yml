services:
  db:
    image: postgres:17
    container_name: worktrack_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-worktrack_db}
      POSTGRES_USER: ${DB_USER:-worktrack_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-worktrack_password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-worktrack_user} -d ${DB_NAME:-worktrack_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    container_name: worktrack_backend
    restart: unless-stopped
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SECRET_KEY: ${SECRET_KEY:-django-dev-secret-key}
      DEBUG: ${DEBUG:-True}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      STATIC_URL: ${STATIC_URL:-static/}
      DB_NAME: ${DB_NAME:-worktrack_db}
      DB_USER: ${DB_USER:-worktrack_user}
      DB_PASSWORD: ${DB_PASSWORD:-worktrack_password}
      DB_HOST: db
      DB_PORT: 5432
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app/backend
      - ../.env:/app/.env:ro

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
    container_name: worktrack_frontend
    restart: unless-stopped
    command: bun run dev -- --host 0.0.0.0 --port 5173
    depends_on:
      - backend
    environment:
      API_BASE_URL: http://backend:8000
      API_PROXY_TARGET: http://backend:8000
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ..:/app
      - frontend_node_modules:/app/frontend/node_modules

volumes:
  postgres_data:
  frontend_node_modules:
